<div class="home-container">
  <h1>Benvenuto in Secure Banking</h1>
  <p>Inserisci il numero del tuo conto per accedere al tuo account.</p>
  <form (ngSubmit)="onSubmit()" class="account-form">
    <label for="accountNumber">Numero Conto:</label>
    <input
      type="text"
      id="accountNumber"
      [(ngModel)]="accountNumber"
      name="accountNumber"
      required
      placeholder="Inserisci il numero del conto"
    />
    <button type="submit" [disabled]="!accountNumber.trim()">Accedi al Conto</button>
  </form>
  <div class="status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
</div>
