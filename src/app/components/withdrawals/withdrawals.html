<div class="form-container">
  <h1>Preleva Fondi</h1>
  <p>Inserisci l'importo e la descrizione del prelievo.</p>
  <form (ngSubmit)="onSubmit()" class="account-form">
    <label for="description">Descrizione:</label>
    <input
      type="text"
      id="description"
      [(ngModel)]="description"
      name="description"
      placeholder="Es: Prelievo bancomat"
    />
    <label for="amount">Importo (€):</label>
    <input
      type="number"
      id="amount"
      [(ngModel)]="amount"
      name="amount"
      required
      min="0.01"
      step="0.01"
      placeholder="Inserisci l'importo"
    />
    <button type="submit" [disabled]="amount <= 0">Preleva</button>
  </form>
  <div class="status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
</div>
