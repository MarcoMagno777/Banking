<div class="form-container">
  <h1>Converti in Criptovaluta</h1>
  <p>Inserisci l'importo e il tipo di criptovaluta.</p>
  <form (ngSubmit)="onSubmit()" class="account-form">
    <label for="amount">Importo (€):</label>
    <input
      type="number"
      id="amount"
      [(ngModel)]="amount"
      name="amount"
      required
      min="0.01"
      step="0.01"
      placeholder="Inserisci l'importo"
    />
    <label for="cryptoType">Tipo Cripto:</label>
    <select id="cryptoType" [(ngModel)]="cryptoType" name="cryptoType">
      <option value="BTC">Bitcoin (BTC)</option>
      <option value="ETH">Ethereum (ETH)</option>
      <option value="ADA">Cardano (ADA)</option>
    </select>
    <button type="submit" [disabled]="amount <= 0">Converti</button>
  </form>
</div>
