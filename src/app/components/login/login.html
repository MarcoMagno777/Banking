<div class="login-layout">
  <button
    type="button"
    class="theme-toggle theme-fab-login"
    (click)="theme.toggle()"
    [attr.aria-label]="theme.theme() === 'dark' ? 'Attiva tema chiaro' : 'Attiva tema scuro'"
  >
    @if (theme.theme() === 'dark') {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    }
  </button>

  <div class="login-shell">
    <div class="hero-panel bank-card">
      <div class="brand-row">
        <div class="brand-mark">SB</div>
        <div class="brand-copy">
          <span class="brand-title">Secure Banking</span>
          <span class="brand-subtitle">Home banking essenziale</span>
        </div>
      </div>

      <h1>Il tuo conto, un colpo d’occhio</h1>
      <p>Accedi con il numero conto per vedere saldo, grafici movimenti e operazioni in stile app moderna.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-card bank-card">
      <div class="form-header">
        <h2>Accedi</h2>
        <p>Inserisci il numero conto (solo cifre).</p>
      </div>

      <label class="bank-label" for="accountNumber">Numero conto</label>
      <input
        class="bank-input"
        type="text"
        id="accountNumber"
        [(ngModel)]="accountNumber"
        name="accountNumber"
        required
        placeholder="Es. 1"
        autocomplete="username"
      />

      <button type="submit" class="bank-btn full" [disabled]="!accountNumber.trim() || isLoggingIn">
        {{ isLoggingIn ? 'Caricamento…' : 'Continua' }}
      </button>

      <div class="banner-err" *ngIf="statusMessage">{{ statusMessage }}</div>
    </form>
  </div>
</div>
