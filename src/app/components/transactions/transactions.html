<div class="form-container">
  <h1>Storico Transazioni</h1>
  <p>Filtra le tue transazioni.</p>
  <form (ngSubmit)="onSubmit()" class="account-form">
    <label for="filter">Filtro:</label>
    <input
      type="text"
      id="filter"
      [(ngModel)]="filter"
      name="filter"
      placeholder="Cerca per descrizione o tipo"
    />
    <button type="submit">Applica Filtro</button>
  </form>
  <div class="transactions-list">
    <h2>Transazioni</h2>
    <div class="status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
    <ul>
      <li 
        *ngFor="let t of filteredTransactions"
        (click)="selectTransaction(t)"
        class="transaction-item"
        [class.positive]="t.amount > 0"
        [class.negative]="t.amount < 0"
      >
        <div class="transaction-info">
          <span class="date">{{ t.date }}</span>
          <span class="description">{{ t.description }}</span>
          <span class="status" [class]="t.status">{{ t.status }}</span>
        </div>
        <span class="amount" [class.amount-positive]="t.amount > 0">
          {{ t.amount > 0 ? '+' : '' }}€{{ getAbsAmount(t.amount) }}
        </span>
      </li>
    </ul>
  </div>
</div>

<app-transaction-detail
  [transaction]="selectedTransaction"
  (closeDetail)="closeDetail()"
></app-transaction-detail>
