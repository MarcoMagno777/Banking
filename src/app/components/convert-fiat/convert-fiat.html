<div class="form-container">
  <h1>Converti in Valuta Fiat</h1>
  <p>Inserisci l'importo e il tipo di valuta.</p>
  <form (ngSubmit)="onSubmit()" class="account-form">
    <label for="amount">Importo (€):</label>
    <input
      type="number"
      id="amount"
      [(ngModel)]="amount"
      name="amount"
      required
      min="0.01"
      step="0.01"
      placeholder="Inserisci l'importo"
    />
    <label for="fiatType">Tipo Valuta:</label>
    <select id="fiatType" [(ngModel)]="fiatType" name="fiatType">
      <option value="USD">Dollaro USA (USD)</option>
      <option value="GBP">Sterlina (GBP)</option>
      <option value="JPY">Yen (JPY)</option>
    </select>
    <button type="submit" [disabled]="amount <= 0">Converti</button>
  </form>
</div>
